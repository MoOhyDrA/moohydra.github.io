<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星辰文廊 · 时间印记</title>
    <!-- marked 解析 Markdown (保留用于三级阅读) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Avenir', 'Helvetica', sans-serif;
        }

        /* 深邃星空背景 —— 增强繁星效果 */
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #0a0e17 100%);
            position: relative;
            color: #f0f0f0;
            overflow-x: hidden;
        }

        /* 星星层：大量随机亮点 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 10px 20px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 140px, #fffa, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 160px 80px, #fcf9f0, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 300px 400px, #fff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 500px 200px, #ffecaa, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 700px 550px, #d4f1ff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 850px 720px, #b0e0ff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 200px 800px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 1100px 300px, #ffddbb, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 1250px 900px, #fff0d0, rgba(0,0,0,0)),
                /* 增加更多星星 */
                radial-gradient(2px 2px at 400px 650px, #9fc5ff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 880px 250px, #ffecaa, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 1300px 500px, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 200px 950px, #c7e0ff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 1550px 300px, #fff0d0, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 350px 350px;
            pointer-events: none;
            z-index: 0;
            animation: twinkling 4s infinite alternate;
        }

        @keyframes twinkling {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* 流星效果 */
        body::after {
            content: "";
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: transparent;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,240,0.15) 1px, transparent 1px),
                              radial-gradient(circle at 80% 70%, rgba(200,230,255,0.1) 1px, transparent 1px);
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 1;
            animation: meteorShower 20s linear infinite;
        }

        @keyframes meteorShower {
            0% { transform: translate(0,0); opacity: 0.3; }
            100% { transform: translate(-5%, -5%); opacity: 0.6; }
        }

        /* 主应用层，绝对定位容器用于动画过渡 */
        .app {
            position: relative;
            min-height: 100vh;
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        /* 所有视图绝对定位，通过opacity/visibility过渡 */
        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            opacity: 1;
            visibility: visible;
            background: transparent; /* 背景由body提供 */
        }

        .view.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ----- 主页视图 ----- */
        .home-view {
            text-align: center;
        }

        .brand {
            font-size: 3.2rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 0 20px #7ec8ff, 0 0 40px #4a6fa5;
            margin-bottom: 2rem;
            color: #f3f9ff;
        }

        .search-box {
            width: min(600px, 90%);
            margin: 1.5rem auto 3rem;
            display: flex;
            background: rgba(10, 20, 40, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            padding: 0.3rem 0.3rem 0.3rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0.5rem;
            font-size: 1.2rem;
            color: #fff;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(200, 220, 255, 0.6);
            font-style: italic;
        }

        .search-box button {
            background: rgba(50, 100, 180, 0.8);
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }

        .search-box button:hover {
            background: #3f7bc0;
            box-shadow: 0 0 25px #5f9eff;
        }

        /* 九宫格分类卡片 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(100px, 180px));
            gap: 1.5rem;
            justify-content: center;
            margin-top: 1rem;
            max-width: 800px;
        }

        .cat-card {
            background: rgba(18, 28, 46, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(120, 180, 255, 0.25);
            border-radius: 32px;
            padding: 1.2rem 0.8rem;
            font-size: 1.4rem;
            font-weight: 400;
            color: #d7e8ff;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
            transition: 0.2s;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #3b8cff;
        }

        .cat-card:hover {
            background: #1f3b5c;
            border-color: #8cbaff;
            transform: scale(1.05);
            box-shadow: 0 0 35px #3f7bc0;
        }

        /* ----- 二级列表视图 (分类/搜索结果) ----- */
        .list-view {
            justify-content: flex-start;  /* 内容从顶部开始 */
        }

        .list-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 1100px;
            flex-wrap: wrap;
        }

        .back-home {
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid #7788aa;
            color: #ccdeff;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px #1a2f4e;
        }

        .back-home:hover {
            background: #2c405e;
            border-color: #b0d0ff;
        }

        .list-title {
            font-size: 2.5rem;
            font-weight: 300;
            background: linear-gradient(145deg, #d8ecff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px #2660a9;
        }

        .list-search-box {
            margin-left: auto;
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid #33475f;
            border-radius: 40px;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            min-width: 250px;
        }

        .list-search-box input {
            background: transparent;
            border: none;
            color: white;
            padding: 0.5rem 0;
            flex: 1;
            outline: none;
        }

        .list-search-box button {
            background: #2a4c77;
            border: none;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
        }

        /* 文章列表容器 (首字母分组) */
        .articles-container {
            background: rgba(8, 18, 30, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid #2a3f5f;
            padding: 2rem 2rem 2rem 2.5rem;
            width: 100%;
            max-width: 1100px;
            margin-top: 1.5rem;
            box-shadow: 0 30px 50px rgba(0,0,0,0.8);
        }

        .letter-group {
            margin-bottom: 2rem;
        }

        .letter-header {
            font-size: 2.2rem;
            font-weight: 400;
            color: #b8d6ff;
            border-bottom: 2px solid #4272a4;
            padding-bottom: 0.2rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 12px #3a82d0;
            letter-spacing: 3px;
        }

        .article-item {
            display: inline-flex;
            align-items: baseline;
            margin: 0.5rem 1.2rem 0.5rem 0;
            background: rgba(70, 120, 200, 0.2);
            border: 1px solid #36648b;
            border-radius: 40px;
            padding: 0.5rem 1.8rem;
            font-size: 1.2rem;
            color: #e0f0ff;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 10px #0a1c30;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .article-item:hover {
            background: #2b5580;
            border-color: #8fcbff;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px #001c33;
        }

        .article-date {
            font-size: 0.85rem;
            color: #a0bbdd;
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            border: 1px solid #4a6f95;
            white-space: nowrap;
        }

        /* ----- 三级沉浸阅读视图 ----- */
        .reader-view {
            justify-content: flex-start;
        }

        .reader-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 900px;
        }

        .back-to-list {
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid #7788aa;
            color: #ccdeff;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .back-to-list:hover {
            background: #2c405e;
        }

        .reader-title {
            font-size: 2.2rem;
            font-weight: 300;
            color: #eef5ff;
            text-shadow: 0 0 20px #6080c0;
            flex: 1;
            word-break: break-word;
        }

        .reader-content {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2.5rem 3rem;
            border: 1px solid #5e7ba0;
            color: #eef6ff;
            font-size: 1.1rem;
            line-height: 1.7;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 30px 70px #0a1b30;
        }

        .reader-content h1, .reader-content h2, .reader-content h3 {
            color: #c4e0ff;
            border-bottom: 1px dashed #4b6e8e;
            padding-bottom: 0.3rem;
        }

        .reader-content a {
            color: #9bc9ff;
        }

        .reader-content code {
            background: #1e2e3f;
            padding: 0.2rem 0.4rem;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
        }

        .reader-content pre {
            background: #111e2c;
            padding: 1rem;
            border-radius: 24px;
            overflow-x: auto;
        }

        .reader-content blockquote {
            border-left: 4px solid #3e6a97;
            background: rgba(255,255,255,0.03);
            padding: 0.5rem 1.5rem;
            margin: 1rem 0;
        }

        .loading {
            color: #b0d0ff;
            padding: 2rem;
            font-size: 1.4rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- 主页视图 -->
    <div id="homeView" class="view home-view">
        <div class="brand">✧ 星辰文廊 ✧</div>
        <div class="search-box">
            <input type="text" id="globalSearchInput" placeholder="搜索所有文章...">
            <button id="globalSearchBtn">搜索</button>
        </div>
        <div class="category-grid" id="categoryGrid"></div>
    </div>

    <!-- 二级列表视图 -->
    <div id="listView" class="view list-view hidden">
        <div class="list-header">
            <button class="back-home" id="backHomeBtn">‹ 主页</button>
            <span class="list-title" id="listViewTitle">分类 · 世设</span>
            <div class="list-search-box">
                <input type="text" id="listSearchInput" placeholder="过滤当前列表...">
                <button id="listSearchBtn">过滤</button>
            </div>
        </div>
        <div class="articles-container" id="articlesList"></div>
    </div>

    <!-- 三级沉浸阅读视图 -->
    <div id="readerView" class="view reader-view hidden">
        <div class="reader-header">
            <button class="back-to-list" id="backToListBtn">‹ 返回列表</button>
            <span class="reader-title" id="readerTitle">文章标题</span>
        </div>
        <div class="reader-content" id="articleContent">
            加载中...
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 用户配置 ----------
        const CONFIG = {
            OWNER: 'moohydra',      // <-- 替换为你的 GitHub 用户名
            REPO: 'moohydra.github.io',             // <-- 替换为仓库名
            POSTS_PATH: 'posts',                 // 存放文章的文件夹
            CATEGORIES: ['世设', '规则', '角色', '战报', '地图', '杂谈', '小说', '占位符1', '占位符2']
        };

        // 模拟数据（用于演示或GitHub获取失败时）
        const MOCK_ARTICLES = [
            { title: '世界构建基础', category: '世设', download_url: '#', fullName: 'world_building.md' },
            { title: '神系设定', category: '世设', download_url: '#', fullName: 'pantheon.md' },
            { title: '战斗规则详解', category: '规则', download_url: '#', fullName: 'combat.md' },
            { title: '魔法系统', category: '规则', download_url: '#', fullName: 'magic.md' },
            { title: '创建角色指南', category: '角色', download_url: '#', fullName: 'character_creation.md' },
            { title: 'NPC设计思路', category: '角色', download_url: '#', fullName: 'npc.md' },
            { title: 'D&D战报：深渊遗迹', category: '战报', download_url: '#', fullName: 'session1.md' },
            { title: '星战战报：起义', category: '战报', download_url: '#', fullName: 'session2.md' },
            { title: '世界地图绘制教程', category: '地图', download_url: '#', fullName: 'map_drawing.md' },
            { title: '地下城地图', category: '地图', download_url: '#', fullName: 'dungeon_map.md' },
            { title: '跑团杂谈：如何当GM', category: '杂谈', download_url: '#', fullName: 'gm_tips.md' },
            { title: '剧本设计心得', category: '杂谈', download_url: '#', fullName: 'scenario.md' },
            { title: '短篇小说：归途', category: '小说', download_url: '#', fullName: 'novel_return.md' },
            { title: '序章：星辰之下', category: '小说', download_url: '#', fullName: 'novel_prologue.md' },
            { title: '占位符文章1', category: '占位符1', download_url: '#', fullName: 'placeholder1.md' },
            { title: '占位符文章2', category: '占位符2', download_url: '#', fullName: 'placeholder2.md' },
        ];

        // ---------- 全局状态 ----------
        let allArticles = [];                // 所有文章 { title, category, download_url, fullName, path }
        let filteredArticles = [];            // 当前列表视图展示的文章（可能带时间戳）
        let currentCategory = null;           // 当前分类名

        // 缓存文章frontmatter (key: download_url)
        const frontmatterCache = new Map();

        // DOM 元素
        const homeView = document.getElementById('homeView');
        const listView = document.getElementById('listView');
        const readerView = document.getElementById('readerView');
        const categoryGrid = document.getElementById('categoryGrid');
        const backHomeBtn = document.getElementById('backHomeBtn');
        const backToListBtn = document.getElementById('backToListBtn');
        const listViewTitle = document.getElementById('listViewTitle');
        const articlesListDiv = document.getElementById('articlesList');
        const readerTitle = document.getElementById('readerTitle');
        const articleContentDiv = document.getElementById('articleContent');
        const globalSearchInput = document.getElementById('globalSearchInput');
        const globalSearchBtn = document.getElementById('globalSearchBtn');
        const listSearchInput = document.getElementById('listSearchInput');
        const listSearchBtn = document.getElementById('listSearchBtn');

        // ---------- 辅助函数 ----------
        function showHome() {
            homeView.classList.remove('hidden');
            listView.classList.add('hidden');
            readerView.classList.add('hidden');
        }

        function showList() {
            homeView.classList.add('hidden');
            listView.classList.remove('hidden');
            readerView.classList.add('hidden');
        }

        function showReader() {
            homeView.classList.add('hidden');
            listView.classList.add('hidden');
            readerView.classList.remove('hidden');
        }

        // 解析frontmatter，提取created和modified字段
        function extractFrontmatter(mdContent) {
            const frontmatterRegex = /^---\s*\n([\s\S]+?)\n---\s*\n/;
            const match = mdContent.match(frontmatterRegex);
            if (!match) return null;

            const yaml = match[1];
            const createdMatch = yaml.match(/created:\s*(.+)/);
            const modifiedMatch = yaml.match(/modified:\s*(.+)/);
            return {
                created: createdMatch ? createdMatch[1].trim() : null,
                modified: modifiedMatch ? modifiedMatch[1].trim() : null,
            };
        }

        // 格式化ISO时间为 YYYY-MM-DD
        function formatDate(isoString) {
            if (!isoString) return '';
            try {
                const d = new Date(isoString);
                if (isNaN(d.getTime())) return '';
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            } catch {
                return '';
            }
        }

        // 获取单篇文章的frontmatter (使用缓存)
        async function fetchFrontmatterForArticle(article) {
            if (article.download_url === '#') return null; // 模拟数据跳过
            if (frontmatterCache.has(article.download_url)) {
                return frontmatterCache.get(article.download_url);
            }
            try {
                const resp = await fetch(article.download_url);
                if (!resp.ok) throw new Error('fetch failed');
                const md = await resp.text();
                const fm = extractFrontmatter(md);
                frontmatterCache.set(article.download_url, fm);
                return fm;
            } catch (e) {
                console.warn(`获取frontmatter失败: ${article.title}`, e);
                frontmatterCache.set(article.download_url, null);
                return null;
            }
        }

        // 为一批文章补充时间戳 (修改原对象)
        async function enrichArticlesWithFrontmatter(articles) {
            const promises = articles.map(async (article) => {
                if (article.created) return; // 已经有过
                const fm = await fetchFrontmatterForArticle(article);
                if (fm && fm.created) {
                    article.created = fm.created;
                    article.modified = fm.modified;
                } else {
                    article.created = null;
                }
            });
            await Promise.allSettled(promises);
        }

        // 获取分类文件夹下所有 .md 文件 (通过 GitHub API)
        async function fetchArticlesByCategory(category) {
            const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/${CONFIG.POSTS_PATH}/${encodeURIComponent(category)}`;
            try {
                const resp = await fetch(url);
                if (!resp.ok) return [];
                const data = await resp.json();
                if (!Array.isArray(data)) return [];
                return data
                    .filter(item => item.name.endsWith('.md') && item.type === 'file')
                    .map(item => ({
                        title: item.name.replace(/\.md$/i, ''),
                        category: category,
                        download_url: item.download_url,
                        fullName: item.name,
                        path: item.path,
                        created: null,  // 待填充
                    }));
            } catch (e) {
                console.warn(`获取分类[${category}]失败，使用模拟数据`, e);
                return MOCK_ARTICLES.filter(a => a.category === category).map(a => ({ ...a, created: null }));
            }
        }

        // 加载所有分类文章 (并发)
        async function loadAllArticles() {
            const promises = CONFIG.CATEGORIES.map(cat => fetchArticlesByCategory(cat));
            const results = await Promise.allSettled(promises);
            let articles = [];
            results.forEach((res, idx) => {
                if (res.status === 'fulfilled') {
                    articles = articles.concat(res.value);
                } else {
                    console.warn(`分类${CONFIG.CATEGORIES[idx]}加载失败`);
                }
            });
            if (articles.length === 0) {
                articles = MOCK_ARTICLES.map(a => ({ ...a, created: null }));
            }
            articles.sort((a, b) => a.title.localeCompare(b.title, 'zh-CN'));
            return articles;
        }

        // 获取文章的首字母分组
        function getFirstLetterGroup(title) {
            if (!title || title.length === 0) return '#';
            const firstChar = title.charAt(0);
            if (/[a-zA-Z]/.test(firstChar)) {
                return firstChar.toUpperCase();
            } else {
                return '☆';
            }
        }

        // 将文章列表按首字母分组
        function groupByFirstLetter(articles) {
            const groups = new Map();
            articles.forEach(article => {
                const letter = getFirstLetterGroup(article.title);
                if (!groups.has(letter)) groups.set(letter, []);
                groups.get(letter).push(article);
            });
            for (let [_, list] of groups.entries()) {
                list.sort((a, b) => a.title.localeCompare(b.title, 'zh-CN'));
            }
            const letters = Array.from(groups.keys()).sort((a, b) => {
                if (a === '☆') return 1;
                if (b === '☆') return -1;
                return a.localeCompare(b);
            });
            return { groups, letters };
        }

        // 渲染文章列表到 articlesListDiv (根据filteredArticles)
        function renderArticleList() {
            const { groups, letters } = groupByFirstLetter(filteredArticles);
            let html = '';
            for (let letter of letters) {
                const articleGroup = groups.get(letter) || [];
                html += `<div class="letter-group"><div class="letter-header">${letter}</div>`;
                articleGroup.forEach(art => {
                    const dateStr = art.created ? formatDate(art.created) : '';
                    html += `<span class="article-item" data-url="${art.download_url}" data-title="${art.title}" data-category="${art.category}">${art.title}`;
                    if (dateStr) {
                        html += `<span class="article-date">${dateStr}</span>`;
                    }
                    html += `</span>`;
                });
                html += `</div>`;
            }
            if (filteredArticles.length === 0) {
                html = '<div style="padding: 2rem; text-align: center; color: #9bb8dd;">🌌 此处暂无文章</div>';
            }
            articlesListDiv.innerHTML = html;

            // 绑定点击事件进入三级阅读器
            document.querySelectorAll('.article-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    const url = el.dataset.url;
                    const title = el.dataset.title;
                    if (url) {
                        loadAndShowArticle(url, title);
                    } else {
                        articleContentDiv.innerHTML = `<h2>✨ ${title}</h2><p>这是一篇示例文章。请配置正确的 GitHub 仓库以加载真实内容。</p>`;
                        readerTitle.innerText = title;
                        showReader();
                    }
                });
            });
        }

        // 加载并显示文章内容（三级视图）
        async function loadAndShowArticle(downloadUrl, title) {
            readerTitle.innerText = title;
            articleContentDiv.innerHTML = '<div class="loading">🌠 正在从星海提取文字...</div>';
            showReader();

            try {
                const resp = await fetch(downloadUrl);
                if (!resp.ok) throw new Error('网络错误');
                const md = await resp.text();
                const htmlContent = marked.parse(md);
                articleContentDiv.innerHTML = htmlContent;
            } catch (e) {
                articleContentDiv.innerHTML = `<h2>✨ ${title}</h2><p style="color:#ffa07a;">读取失败，星尘干扰了信号。请确认仓库中存在该文件。</p>`;
            }
        }

        // 设置列表视图上下文并刷新
        async function setListContext(type, value) {
            if (type === 'category') {
                currentCategory = value;
                listViewTitle.innerText = `分类 · ${value}`;
                filteredArticles = allArticles.filter(a => a.category === value);
                // 先渲染无时间版本
                renderArticleList();
                // 异步补充时间戳
                await enrichArticlesWithFrontmatter(filteredArticles);
                renderArticleList(); // 重新渲染显示时间
            } else if (type === 'search') {
                currentCategory = null;
                listViewTitle.innerText = `搜索 · ${value}`;
                const kw = value.toLowerCase();
                filteredArticles = allArticles.filter(a => a.title.toLowerCase().includes(kw));
                renderArticleList();
                // 搜索一般不显示时间，为了性能可以跳过，但也可以尝试补充
                await enrichArticlesWithFrontmatter(filteredArticles);
                renderArticleList();
            }
        }

        // 初始化分类按钮
        function initCategoryButtons() {
            CONFIG.CATEGORIES.forEach(cat => {
                const btn = document.createElement('div');
                btn.className = 'cat-card';
                btn.innerText = cat;
                btn.addEventListener('click', async () => {
                    if (allArticles.length === 0) {
                        articlesListDiv.innerHTML = '<div class="loading">🌟 召唤星辰文章...</div>';
                        showList();
                        allArticles = await loadAllArticles();
                    }
                    await setListContext('category', cat);
                    showList();
                });
                categoryGrid.appendChild(btn);
            });
        }

        // 初始化加载所有文章 (预加载)
        async function initializeArticles() {
            try {
                allArticles = await loadAllArticles();
            } catch (e) {
                console.warn('预加载失败，使用模拟数据');
                allArticles = MOCK_ARTICLES.map(a => ({ ...a, created: null }));
            }
        }

        // ---------- 事件绑定 ----------
        backHomeBtn.addEventListener('click', () => {
            showHome();
        });

        backToListBtn.addEventListener('click', () => {
            showList();
        });

        // 主页全局搜索
        globalSearchBtn.addEventListener('click', async () => {
            const kw = globalSearchInput.value.trim();
            if (kw === '') return;
            if (allArticles.length === 0) {
                articlesListDiv.innerHTML = '<div class="loading">🔭 搜索星海，请稍候...</div>';
                showList();
                allArticles = await loadAllArticles();
            }
            await setListContext('search', kw);
            showList();
        });

        globalSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') globalSearchBtn.click();
        });

        // 列表视图内过滤
        listSearchBtn.addEventListener('click', () => {
            const kw = listSearchInput.value.trim().toLowerCase();
            if (!currentCategory) {
                // 处于搜索状态或全列表
                filteredArticles = allArticles.filter(a => a.title.toLowerCase().includes(kw));
            } else {
                filteredArticles = allArticles.filter(a => a.category === currentCategory && a.title.toLowerCase().includes(kw));
            }
            renderArticleList();
            // 可异步补充时间戳
            enrichArticlesWithFrontmatter(filteredArticles).then(() => renderArticleList());
        });

        listSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') listSearchBtn.click();
        });

        // 启动
        (async function init() {
            initCategoryButtons();
            await initializeArticles();

            if (CONFIG.OWNER === 'your-github-username') {
                console.log('提示：请修改CONFIG中的OWNER和REPO为你自己的GitHub信息。当前使用模拟数据展示。');
            }
        })();
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你不知道的黑暗事实</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ---------- CSS 变量与主题定义 ---------- */
        :root {
            --bg-gradient: radial-gradient(ellipse at bottom, #1b2735 0%, #0a0e17 100%);
            --text-main: #f0f0f0;
            --text-muted: #a0bbdd;
            --brand-color: #f3f9ff;
            --brand-shadow: 0 0 20px #7ec8ff, 0 0 40px #4a6fa5;
            
            --box-bg: rgba(10, 20, 40, 0.5);
            --box-border: rgba(255, 255, 255, 0.15);
            --box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            
            --input-text: #fff;
            --input-placeholder: rgba(200, 220, 255, 0.6);
            
            --btn-bg: rgba(50, 100, 180, 0.8);
            --btn-text: white;
            --btn-hover: #3f7bc0;
            --btn-shadow: 0 0 25px #5f9eff;
            
            --card-bg: rgba(18, 28, 46, 0.6);
            --card-border: rgba(120, 180, 255, 0.25);
            --card-text: #d7e8ff;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
            --card-hover-bg: #1f3b5c;
            --card-hover-border: #8cbaff;
            --card-hover-shadow: 0 0 35px #3f7bc0;
            --card-text-shadow: 0 0 10px #3b8cff;
            
            --list-title-grad: linear-gradient(145deg, #d8ecff, #aaccff);
            --list-title-shadow: 0 0 30px #2660a9;
            
            --article-box-bg: rgba(8, 18, 30, 0.5);
            --article-box-border: #2a3f5f;
            --article-item-bg: rgba(70, 120, 200, 0.2);
            --article-item-border: #36648b;
            --article-item-text: #e0f0ff;
            --article-item-hover: #2b5580;
            
            --reader-bg: rgba(0, 0, 0, 0.6);
            --reader-border: #5e7ba0;
            --reader-title: #eef5ff;
            --reader-meta-bg: rgba(0, 0, 0, 0.3);
            
            --code-bg: #1e2e3f;
            --pre-bg: #111e2c;
            --link-color: #9bc9ff;
            --quote-border: #3e6a97;
            
            --stars-display: block;
        }

        /* 明亮模式 (Day Mode) 变量 */
        body.light-mode {
            --bg-gradient: radial-gradient(ellipse at top, #f0f4f8 0%, #d9e2ec 100%);
            --text-main: #334e68;
            --text-muted: #627d98;
            --brand-color: #102a43;
            --brand-shadow: 0 0 15px rgba(16, 42, 67, 0.1);
            
            --box-bg: rgba(255, 255, 255, 0.7);
            --box-border: rgba(16, 42, 67, 0.1);
            --box-shadow: 0 8px 30px rgba(16, 42, 67, 0.08);
            
            --input-text: #102a43;
            --input-placeholder: rgba(98, 125, 152, 0.6);
            
            --btn-bg: rgba(43, 108, 176, 0.9);
            --btn-text: white;
            --btn-hover: #1e4e8c;
            --btn-shadow: 0 4px 15px rgba(43, 108, 176, 0.3);
            
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(43, 108, 176, 0.2);
            --card-text: #243b53;
            --card-shadow: 0 4px 15px rgba(16, 42, 67, 0.05);
            --card-hover-bg: #f0f4f8;
            --card-hover-border: #2b6cb0;
            --card-hover-shadow: 0 8px 25px rgba(43, 108, 176, 0.15);
            --card-text-shadow: none;
            
            --list-title-grad: linear-gradient(145deg, #102a43, #243b53);
            --list-title-shadow: none;
            
            --article-box-bg: rgba(255, 255, 255, 0.6);
            --article-box-border: rgba(16, 42, 67, 0.1);
            --article-item-bg: rgba(240, 244, 248, 0.8);
            --article-item-border: rgba(43, 108, 176, 0.2);
            --article-item-text: #243b53;
            --article-item-hover: #e1e8ef;
            
            --reader-bg: rgba(255, 255, 255, 0.85);
            --reader-border: rgba(16, 42, 67, 0.1);
            --reader-title: #102a43;
            --reader-meta-bg: rgba(240, 244, 248, 0.6);
            
            --code-bg: #e1e8ef;
            --pre-bg: #f0f4f8;
            --link-color: #2b6cb0;
            --quote-border: #2b6cb0;
            
            --stars-display: none; /* 白天隐藏星星和流星 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Avenir', 'Helvetica', sans-serif;
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease;
        }

        html, body {
            height: 100%;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            position: relative;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* 星星层 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: var(--stars-display);
            background-image: 
                radial-gradient(2px 2px at 10px 20px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 140px, #fffa, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 160px 80px, #fcf9f0, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 300px 400px, #fff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 500px 200px, #ffecaa, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 700px 550px, #d4f1ff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 850px 720px, #b0e0ff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 1100px 300px, #ffddbb, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 350px 350px;
            pointer-events: none;
            z-index: 0;
            animation: twinkling 4s infinite alternate;
        }

        @keyframes twinkling {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* 流星效果 */
        body::after {
            content: "";
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            display: var(--stars-display);
            background: transparent;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,240,0.15) 1px, transparent 1px),
                              radial-gradient(circle at 80% 70%, rgba(200,230,255,0.1) 1px, transparent 1px);
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 1;
            animation: meteorShower 20s linear infinite;
        }

        @keyframes meteorShower {
            0% { transform: translate(0,0); opacity: 0.3; }
            100% { transform: translate(-5%, -5%); opacity: 0.6; }
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--box-bg);
            border: 1px solid var(--box-border);
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: var(--box-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background 0.3s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .app {
            position: relative;
            min-height: 100vh;
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        .view {
            position: absolute;
            top: 0; left: 0; width: 100%; min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            transition: opacity 0.5s ease, transform 0.5s ease, visibility 0.5s ease;
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .view.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px) scale(0.95);
        }

        /* ----- 主页视图 ----- */
        .home-view { text-align: center; }

        .brand {
            font-size: 3.2rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: var(--brand-shadow);
            margin-bottom: 2rem;
            color: var(--brand-color);
        }

        .search-box {
            width: min(600px, 90%);
            margin: 1.5rem auto 3rem;
            display: flex;
            background: var(--box-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--box-border);
            border-radius: 60px;
            padding: 0.3rem 0.3rem 0.3rem 2rem;
            box-shadow: var(--box-shadow);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0.5rem;
            font-size: 1.2rem;
            color: var(--input-text);
            outline: none;
        }

        .search-box input::placeholder {
            color: var(--input-placeholder);
            font-style: italic;
        }

        .search-box button {
            background: var(--btn-bg);
            border: none;
            color: var(--btn-text);
            font-size: 1.1rem;
            font-weight: 500;
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            border: 1px solid var(--box-border);
            letter-spacing: 1px;
        }

        .search-box button:hover {
            background: var(--btn-hover);
            box-shadow: var(--btn-shadow);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(100px, 180px));
            gap: 1.5rem;
            justify-content: center;
            margin-top: 1rem;
            max-width: 800px;
            width: 100%;
        }

        .cat-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 1.2rem 0.8rem;
            font-size: 1.4rem;
            color: var(--card-text);
            text-align: center;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            letter-spacing: 2px;
            text-shadow: var(--card-text-shadow);
        }

        .cat-card:hover {
            background: var(--card-hover-bg);
            border-color: var(--card-hover-border);
            transform: scale(1.05);
            box-shadow: var(--card-hover-shadow);
        }

        /* ----- 二级列表视图 ----- */
        .list-view { justify-content: flex-start; }

        .list-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 1100px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: var(--box-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--box-border);
            color: var(--text-main);
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .back-btn:hover { background: var(--btn-hover); color: white; }

        .list-title {
            font-size: 2.5rem;
            font-weight: 300;
            background: var(--list-title-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: var(--list-title-shadow);
        }

        .list-search-box {
            margin-left: auto;
            display: flex;
            background: var(--box-bg);
            backdrop-filter: blur(4px);
            border: 1px solid var(--box-border);
            border-radius: 40px;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            min-width: 250px;
        }

        .list-search-box input {
            background: transparent;
            border: none;
            color: var(--input-text);
            padding: 0.5rem 0;
            flex: 1;
            outline: none;
        }

        .list-search-box button {
            background: var(--btn-bg);
            border: none;
            color: var(--btn-text);
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
        }

        .articles-container {
            background: var(--article-box-bg);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid var(--article-box-border);
            padding: 2rem 2rem 2rem 2.5rem;
            width: 100%;
            max-width: 1100px;
            box-shadow: var(--box-shadow);
        }

        .letter-group { margin-bottom: 2rem; }
        .letter-header {
            font-size: 2.2rem;
            color: var(--text-main);
            border-bottom: 2px solid var(--card-border);
            padding-bottom: 0.2rem;
            margin-bottom: 1rem;
            letter-spacing: 3px;
        }

        .article-item {
            display: inline-flex;
            align-items: baseline;
            margin: 0.5rem 1.2rem 0.5rem 0;
            background: var(--article-item-bg);
            border: 1px solid var(--article-item-border);
            border-radius: 40px;
            padding: 0.5rem 1.8rem;
            font-size: 1.2rem;
            color: var(--article-item-text);
            cursor: pointer;
            backdrop-filter: blur(4px);
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .article-item:hover {
            background: var(--article-item-hover);
            transform: translateY(-3px);
        }

        .article-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--box-bg);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            border: 1px solid var(--box-border);
            white-space: nowrap;
        }

        /* ----- 三级阅读视图 ----- */
        .reader-view { justify-content: flex-start; }
        
        .reader-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 900px;
            flex-wrap: wrap;
        }

        .reader-title {
            font-size: 2.2rem;
            font-weight: 300;
            color: var(--reader-title);
            flex: 1;
            word-break: break-word;
        }

        .reader-meta {
            width: 100%;
            max-width: 900px;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 2rem;
            background: var(--reader-meta-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--reader-border);
            border-radius: 40px;
            padding: 0.6rem 2rem;
            font-size: 0.95rem;
            color: var(--text-main);
            flex-wrap: wrap;
        }

        .meta-item { display: flex; align-items: center; gap: 0.5rem; }
        .meta-item span:first-child { color: var(--text-muted); }

        .reader-content {
            background: var(--reader-bg);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2.5rem 3rem;
            border: 1px solid var(--reader-border);
            color: var(--text-main);
            font-size: 1.1rem;
            line-height: 1.7;
            width: 100%;
            max-width: 900px;
            box-shadow: var(--box-shadow);
        }

        .reader-content h1, .reader-content h2, .reader-content h3 {
            color: var(--reader-title);
            border-bottom: 1px dashed var(--reader-border);
            padding-bottom: 0.3rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .reader-content a { color: var(--link-color); }
        .reader-content code {
            background: var(--code-bg);
            padding: 0.2rem 0.4rem;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
        }
        .reader-content pre {
            background: var(--pre-bg);
            padding: 1rem;
            border-radius: 24px;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .reader-content blockquote {
            border-left: 4px solid var(--quote-border);
            background: var(--reader-meta-bg);
            padding: 0.5rem 1.5rem;
            margin: 1rem 0;
            border-radius: 0 12px 12px 0;
        }

        /* ----- 响应式优化 (移动端适配) ----- */
        @media (max-width: 768px) {
            .theme-toggle {
                top: 15px; right: 15px;
                width: 38px; height: 38px;
                font-size: 1rem;
            }
            .view { padding: 1.5rem 1rem; }
            .brand { font-size: 2.2rem; letter-spacing: 4px; }
            
            .search-box {
                flex-direction: column;
                padding: 0.5rem;
                border-radius: 24px;
            }
            .search-box input { border-bottom: 1px solid var(--box-border); padding: 0.8rem; }
            .search-box button { margin-top: 0.5rem; width: 100%; border-radius: 20px; }
            
            .category-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            
            .list-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .list-search-box { width: 100%; margin-left: 0; box-sizing: border-box; }
            
            .articles-container { padding: 1.5rem 1rem; border-radius: 24px; }
            .reader-content { padding: 1.5rem 1rem; border-radius: 24px; }
            .reader-header { gap: 1rem; flex-direction: column; align-items: flex-start;}
            .reader-title { font-size: 1.8rem; }
        }

        @media (max-width: 480px) {
            .category-grid { grid-template-columns: 1fr; }
            .article-item { width: 100%; margin-right: 0; justify-content: space-between; }
        }
    </style>
</head>
<body>
<button id="themeToggle" class="theme-toggle" aria-label="切换昼夜模式" title="切换昼夜模式">☀️</button>

<div class="app" id="app">
    <div id="homeView" class="view home-view">
        <div class="brand">✧黑暗文库✧</div>
        <div class="search-box">
            <input type="text" id="globalSearchInput" placeholder="搜索所有文章...">
            <button id="globalSearchBtn">搜索</button>
        </div>
        <div class="category-grid" id="categoryGrid"></div>
    </div>

    <div id="listView" class="view list-view hidden">
        <div class="list-header">
            <button class="back-btn" id="backHomeBtn">‹ 主页</button>
            <span class="list-title" id="listViewTitle">分类 · 世设</span>
            <div class="list-search-box">
                <input type="text" id="listSearchInput" placeholder="过滤当前列表...">
                <button id="listSearchBtn">过滤</button>
            </div>
        </div>
        <div class="articles-container" id="articlesList"></div>
    </div>

    <div id="readerView" class="view reader-view hidden">
        <div class="reader-header">
            <button class="back-btn" id="backToListBtn">‹ 返回列表</button>
            <span class="reader-title" id="readerTitle">文章标题</span>
        </div>
        <div class="reader-meta" id="readerMeta">
            <div class="meta-item"><span>创建:</span> <span id="readerCreated">--</span></div>
            <div class="meta-item"><span>修改:</span> <span id="readerModified">--</span></div>
        </div>
        <div class="reader-content" id="articleContent">
            加载中...
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 主题切换逻辑 ----------
        const themeToggle = document.getElementById('themeToggle');
        
        // 检查本地存储的主题偏好
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'light') {
            document.body.classList.add('light-mode');
            themeToggle.innerText = '🌙';
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            themeToggle.innerText = isLight ? '🌙' : '☀️';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });

        // ---------- 原有用户配置逻辑 ----------
        const CONFIG = {
            OWNER: 'moohydra',
            REPO: 'moohydra.github.io',
            POSTS_PATH: 'posts',
            CATEGORIES: ['世设', '规则', '角色', '战报', '地图', '杂谈', '小说', '占位符1', '占位符2']
        };

        const MOCK_ARTICLES = [
            { title: '世界构建基础', category: '世设', download_url: '#', fullName: 'world_building.md' },
            { title: '神系设定', category: '世设', download_url: '#', fullName: 'pantheon.md' },
            { title: '战斗规则详解', category: '规则', download_url: '#', fullName: 'combat.md' },
            { title: '魔法系统', category: '规则', download_url: '#', fullName: 'magic.md' },
            { title: '创建角色指南', category: '角色', download_url: '#', fullName: 'character_creation.md' },
            { title: 'NPC设计思路', category: '角色', download_url: '#', fullName: 'npc.md' },
            { title: 'D&D战报：深渊遗迹', category: '战报', download_url: '#', fullName: 'session1.md' },
            { title: '星战战报：起义', category: '战报', download_url: '#', fullName: 'session2.md' },
            { title: '世界地图绘制教程', category: '地图', download_url: '#', fullName: 'map_drawing.md' },
            { title: '地下城地图', category: '地图', download_url: '#', fullName: 'dungeon_map.md' },
            { title: '跑团杂谈：如何当GM', category: '杂谈', download_url: '#', fullName: 'gm_tips.md' },
            { title: '剧本设计心得', category: '杂谈', download_url: '#', fullName: 'scenario.md' },
            { title: '短篇小说：归途', category: '小说', download_url: '#', fullName: 'novel_return.md' },
            { title: '序章：星辰之下', category: '小说', download_url: '#', fullName: 'novel_prologue.md' },
            { title: '占位符文章1', category: '占位符1', download_url: '#', fullName: 'placeholder1.md' },
            { title: '占位符文章2', category: '占位符2', download_url: '#', fullName: 'placeholder2.md' },
        ];

        let allArticles = [];
        let filteredArticles = [];
        let currentCategory = null;
        const frontmatterCache = new Map();

        const homeView = document.getElementById('homeView');
        const listView = document.getElementById('listView');
        const readerView = document.getElementById('readerView');
        const categoryGrid = document.getElementById('categoryGrid');
        const backHomeBtn = document.getElementById('backHomeBtn');
        const backToListBtn = document.getElementById('backToListBtn');
        const listViewTitle = document.getElementById('listViewTitle');
        const articlesListDiv = document.getElementById('articlesList');
        const readerTitle = document.getElementById('readerTitle');
        const readerCreated = document.getElementById('readerCreated');
        const readerModified = document.getElementById('readerModified');
        const articleContentDiv = document.getElementById('articleContent');
        const globalSearchInput = document.getElementById('globalSearchInput');
        const globalSearchBtn = document.getElementById('globalSearchBtn');
        const listSearchInput = document.getElementById('listSearchInput');
        const listSearchBtn = document.getElementById('listSearchBtn');

        function showHome() {
            homeView.classList.remove('hidden');
            listView.classList.add('hidden');
            readerView.classList.add('hidden');
        }

        function showList() {
            homeView.classList.add('hidden');
            listView.classList.remove('hidden');
            readerView.classList.add('hidden');
        }

        function showReader() {
            homeView.classList.add('hidden');
            listView.classList.add('hidden');
            readerView.classList.remove('hidden');
        }

        function extractFrontmatter(mdContent) {
            const frontmatterRegex = /^---\s*\n([\s\S]+?)\n---\s*\n/;
            const match = mdContent.match(frontmatterRegex);
            if (!match) return null;

            const yaml = match[1];
            const createdMatch = yaml.match(/created:\s*(.+)/);
            const modifiedMatch = yaml.match(/modified:\s*(.+)/);
            return {
                created: createdMatch ? createdMatch[1].trim() : null,
                modified: modifiedMatch ? modifiedMatch[1].trim() : null,
            };
        }

        function formatDateTime(isoString) {
            if (!isoString) return '';
            try {
                const d = new Date(isoString);
                if (isNaN(d.getTime())) return '';
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const hour = String(d.getHours()).padStart(2, '0');
                const minute = String(d.getMinutes()).padStart(2, '0');
                return `${year}-${month}-${day} ${hour}:${minute}`;
            } catch {
                return '';
            }
        }

        async function fetchFrontmatterForArticle(article) {
            if (article.download_url === '#') return null;
            if (frontmatterCache.has(article.download_url)) return frontmatterCache.get(article.download_url);
            try {
                const resp = await fetch(article.download_url);
                if (!resp.ok) throw new Error('fetch failed');
                const md = await resp.text();
                const fm = extractFrontmatter(md);
                frontmatterCache.set(article.download_url, fm);
                return fm;
            } catch (e) {
                frontmatterCache.set(article.download_url, null);
                return null;
            }
        }

        async function enrichArticlesWithFrontmatter(articles) {
            const promises = articles.map(async (article) => {
                if (article.created) return;
                const fm = await fetchFrontmatterForArticle(article);
                if (fm && fm.created) {
                    article.created = fm.created;
                    article.modified = fm.modified;
                } else {
                    article.created = null;
                }
            });
            await Promise.allSettled(promises);
        }

        async function fetchArticlesByCategory(category) {
            const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/${CONFIG.POSTS_PATH}/${encodeURIComponent(category)}`;
            try {
                const resp = await fetch(url);
                if (!resp.ok) return [];
                const data = await resp.json();
                if (!Array.isArray(data)) return [];
                return data
                    .filter(item => item.name.endsWith('.md') && item.type === 'file')
                    .map(item => ({
                        title: item.name.replace(/\.md$/i, ''),
                        category: category,
                        download_url: item.download_url,
                        fullName: item.name,
                        path: item.path,
                        created: null,
                    }));
            } catch (e) {
                return MOCK_ARTICLES.filter(a => a.category === category).map(a => ({ ...a, created: null }));
            }
        }

        async function loadAllArticles() {
            const promises = CONFIG.CATEGORIES.map(cat => fetchArticlesByCategory(cat));
            const results = await Promise.allSettled(promises);
            let articles = [];
            results.forEach((res, idx) => {
                if (res.status === 'fulfilled') {
                    articles = articles.concat(res.value);
                }
            });
            if (articles.length === 0) articles = MOCK_ARTICLES.map(a => ({ ...a, created: null }));
            articles.sort((a, b) => a.title.localeCompare(b.title, 'zh-CN'));
            return articles;
        }

        function getFirstLetterGroup(title) {
            if (!title || title.length === 0) return '#';
            const firstChar = title.charAt(0);
            return /[a-zA-Z]/.test(firstChar) ? firstChar.toUpperCase() : '☆';
        }

        function groupByFirstLetter(articles) {
            const groups = new Map();
            articles.forEach(article => {
                const letter = getFirstLetterGroup(article.title);
                if (!groups.has(letter)) groups.set(letter, []);
                groups.get(letter).push(article);
            });
            for (let [_, list] of groups.entries()) {
                list.sort((a, b) => a.title.localeCompare(b.title, 'zh-CN'));
            }
            const letters = Array.from(groups.keys()).sort((a, b) => {
                if (a === '☆') return 1;
                if (b === '☆') return -1;
                return a.localeCompare(b);
            });
            return { groups, letters };
        }

        function renderArticleList() {
            const { groups, letters } = groupByFirstLetter(filteredArticles);
            let html = '';
            for (let letter of letters) {
                const articleGroup = groups.get(letter) || [];
                html += `<div class="letter-group"><div class="letter-header">${letter}</div>`;
                articleGroup.forEach(art => {
                    const dateStr = art.created ? formatDateTime(art.created).split(' ')[0] : '';
                    html += `<span class="article-item" data-url="${art.download_url}" data-title="${art.title}" data-category="${art.category}">${art.title}`;
                    if (dateStr) html += `<span class="article-date">${dateStr}</span>`;
                    html += `</span>`;
                });
                html += `</div>`;
            }
            if (filteredArticles.length === 0) {
                html = '<div style="padding: 2rem; text-align: center; color: var(--text-muted);">🌌 此处暂无文章</div>';
            }
            articlesListDiv.innerHTML = html;

            document.querySelectorAll('.article-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    const url = el.dataset.url;
                    const title = el.dataset.title;
                    if (url) {
                        loadAndShowArticle(url, title);
                    } else {
                        articleContentDiv.innerHTML = `<h2>✨ ${title}</h2><p>这是一篇示例文章。请配置正确的 GitHub 仓库以加载真实内容。</p>`;
                        readerTitle.innerText = title;
                        readerCreated.innerText = '--';
                        readerModified.innerText = '--';
                        showReader();
                    }
                });
            });
        }

        async function loadAndShowArticle(downloadUrl, title) {
            readerTitle.innerText = title;
            readerCreated.innerText = '--';
            readerModified.innerText = '--';
            articleContentDiv.innerHTML = '<div style="text-align:center; padding: 2rem; color: var(--text-muted);">🌠 正在提取文字...</div>';
            showReader();

            try {
                const resp = await fetch(downloadUrl);
                if (!resp.ok) throw new Error('网络错误');
                const md = await resp.text();

                const fm = extractFrontmatter(md);
                if (fm) {
                    if (fm.created) readerCreated.innerText = formatDateTime(fm.created);
                    if (fm.modified) readerModified.innerText = formatDateTime(fm.modified);
                }

                const contentWithoutFrontmatter = md.replace(/^---\s*\n[\s\S]*?\n---\s*\n/, '');
                articleContentDiv.innerHTML = marked.parse(contentWithoutFrontmatter);
            } catch (e) {
                articleContentDiv.innerHTML = `<h2>✨ ${title}</h2><p style="color:#ffa07a;">读取失败，请确认仓库中存在该文件。</p>`;
            }
        }

        async function setListContext(type, value) {
            if (type === 'category') {
                currentCategory = value;
                listViewTitle.innerText = `分类 · ${value}`;
                filteredArticles = allArticles.filter(a => a.category === value);
                renderArticleList();
                await enrichArticlesWithFrontmatter(filteredArticles);
                renderArticleList();
            } else if (type === 'search') {
                currentCategory = null;
                listViewTitle.innerText = `搜索 · ${value}`;
                const kw = value.toLowerCase();
                filteredArticles = allArticles.filter(a => a.title.toLowerCase().includes(kw));
                renderArticleList();
                await enrichArticlesWithFrontmatter(filteredArticles);
                renderArticleList();
            }
        }

        function initCategoryButtons() {
            CONFIG.CATEGORIES.forEach(cat => {
                const btn = document.createElement('div');
                btn.className = 'cat-card';
                btn.innerText = cat;
                btn.addEventListener('click', async () => {
                    if (allArticles.length === 0) {
                        articlesListDiv.innerHTML = '<div style="text-align:center; padding: 2rem; color: var(--text-muted);">🌟 正在召唤...</div>';
                        showList();
                        allArticles = await loadAllArticles();
                    }
                    await setListContext('category', cat);
                    showList();
                });
                categoryGrid.appendChild(btn);
            });
        }

        async function initializeArticles() {
            try {
                allArticles = await loadAllArticles();
            } catch (e) {
                allArticles = MOCK_ARTICLES.map(a => ({ ...a, created: null }));
            }
        }

        backHomeBtn.addEventListener('click', showHome);
        backToListBtn.addEventListener('click', showList);

        globalSearchBtn.addEventListener('click', async () => {
            const kw = globalSearchInput.value.trim();
            if (kw === '') return;
            if (allArticles.length === 0) {
                articlesListDiv.innerHTML = '<div style="text-align:center; padding: 2rem; color: var(--text-muted);">🔭 搜索中，请稍候...</div>';
                showList();
                allArticles = await loadAllArticles();
            }
            await setListContext('search', kw);
            showList();
        });

        globalSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') globalSearchBtn.click();
        });

        listSearchBtn.addEventListener('click', () => {
            const kw = listSearchInput.value.trim().toLowerCase();
            if (!currentCategory) {
                filteredArticles = allArticles.filter(a => a.title.toLowerCase().includes(kw));
            } else {
                filteredArticles = allArticles.filter(a => a.category === currentCategory && a.title.toLowerCase().includes(kw));
            }
            renderArticleList();
            enrichArticlesWithFrontmatter(filteredArticles).then(() => renderArticleList());
        });

        listSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') listSearchBtn.click();
        });

        (async function init() {
            initCategoryButtons();
            await initializeArticles();
        })();
    })();
</script>
</body>
</html>
